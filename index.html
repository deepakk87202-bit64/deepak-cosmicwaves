<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deepak Games | Pro Snake</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg-grad: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
    --panel-bg: rgba(255, 255, 255, 0.8);
    --text-main: #0f172a; --accent: #0284c7;
  }
  [data-theme="dark"] { --bg-grad: linear-gradient(135deg, #111827 0%, #1f2937 100%); --panel-bg: rgba(17, 24, 39, 0.9); --text-main: #f8fafc; --accent: #9ca3af; }
  [data-theme="green"] { --bg-grad: linear-gradient(135deg, #dcfce7 0%, #86efac 100%); --accent: #16a34a; --text-main: #14532d; }
  [data-theme="pink"] { --bg-grad: linear-gradient(135deg, #fce7f3 0%, #f9a8d4 100%); --accent: #db2777; --text-main: #831843; }
  [data-theme="yellow"] { --bg-grad: linear-gradient(135deg, #fef9c3 0%, #fde047 100%); --text-main: #422006; --accent: #ca8a04; }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body { background: var(--bg-grad); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; transition: 0.5s; }
  
  nav { width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-wrap: wrap; gap: 10px; }
  .nav-btn { text-decoration: none; color: white; background: var(--accent); padding: 8px 15px; border-radius: 10px; font-weight: bold; transition: 0.3s; }
  .theme-box { display: flex; gap: 10px; }
  .theme-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  
  .game-container { margin-top: 30px; text-align: center; }
  .hud { display: flex; justify-content: space-between; width: 400px; margin-bottom: 10px; font-size: 1.5rem; font-weight: bold; background: var(--panel-bg); padding: 10px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  canvas { background: #ffffff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 4px solid var(--accent); }
  
  #start-btn { margin-top: 20px; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 30px; border: none; background: var(--accent); color: white; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<nav>
  <h2><i class="fa-solid fa-dragon"></i> Deepak Games</h2>
  <div class="theme-box">
    <div class="theme-dot" style="background: #0284c7;" onclick="setTheme('', '#0284c7', '#38bdf8', '#ef4444')"></div>
    <div class="theme-dot" style="background: #111827;" onclick="setTheme('dark', '#9ca3af', '#d1d5db', '#ef4444')"></div>
    <div class="theme-dot" style="background: #16a34a;" onclick="setTheme('green', '#14532d', '#22c55e', '#ef4444')"></div>
    <div class="theme-dot" style="background: #db2777;" onclick="setTheme('pink', '#831843', '#ec4899', '#db2777')"></div>
    <div class="theme-dot" style="background: #ca8a04;" onclick="setTheme('yellow', '#713f12', '#eab308', '#ca8a04')"></div>
  </div>
  <div>
    <a href="tictactoe.html" class="nav-btn">Tic-Tac-Toe</a>
    <a href="ludo.html" class="nav-btn" style="background: #ef4444;">Ludo</a>
  </div>
</nav>

<div class="game-container">
  <div class="hud">
    <div>🍎 <span id="score">0</span></div>
    <div>👑 <span id="high-score">0</span></div>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <br>
  <button id="start-btn" onclick="startGame()">▶ Start Game</button>
</div>

<script>
  // Game Variables
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const grid = 20;
  let snake = []; let food = {}; let dx = 0; let dy = -grid;
  let score = 0; let highScore = localStorage.getItem('snk_hs') || 0;
  let loop; let isPlaying = false;

  // Hardcoded Colors to prevent blank screen
  let colors = { head: '#0284c7', body: '#38bdf8', apple: '#ef4444', bg: '#f8fafc', grid: '#e2e8f0' };

  document.getElementById('high-score').innerText = highScore;

  function setTheme(theme, head, body, apple) {
    document.body.setAttribute('data-theme', theme);
    colors.head = head; colors.body = body; colors.apple = apple;
    colors.bg = theme === 'dark' ? '#1f2937' : '#ffffff';
    colors.grid = theme === 'dark' ? '#374151' : '#e2e8f0';
    if(!isPlaying) drawBase();
  }

  // Audio Safely
  function playSound(type) {
    try {
      let a = new Audio(type + '.mp3');
      a.play().catch(e => {}); // Ignores error if MP3 is missing
    } catch(e) {}
  }

  document.addEventListener('keydown', e => {
    if(!isPlaying) return;
    if(e.key === 'ArrowLeft' && dx === 0) { dx = -grid; dy = 0; }
    else if(e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -grid; }
    else if(e.key === 'ArrowRight' && dx === 0) { dx = grid; dy = 0; }
    else if(e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = grid; }
  });

  function spawnFood() {
    food = { x: Math.floor(Math.random() * (canvas.width/grid)) * grid, y: Math.floor(Math.random() * (canvas.height/grid)) * grid };
  }

  function startGame() {
    document.getElementById('start-btn').classList.add('hidden');
    snake = [{x: 200, y: 200}, {x: 200, y: 220}];
    dx = 0; dy = -grid; score = 0; document.getElementById('score').innerText = score;
    spawnFood(); isPlaying = true;
    if(loop) clearInterval(loop);
    loop = setInterval(gameStep, 100);
  }

  function gameStep() {
    let head = {x: snake[0].x + dx, y: snake[0].y + dy};
    
    // Wall Collision
    if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) return gameOver();
    // Self Collision
    for(let i=0; i<snake.length; i++) if(head.x === snake[i].x && head.y === snake[i].y) return gameOver();

    snake.unshift(head);

    // Eat Apple
    if(head.x === food.x && head.y === food.y) {
      playSound('eat'); score += 10; document.getElementById('score').innerText = score;
      if(score > highScore) { highScore = score; localStorage.setItem('snk_hs', highScore); document.getElementById('high-score').innerText = highScore; }
      spawnFood();
    } else { snake.pop(); }

    drawBase();
  }

  function drawBase() {
    // Background & Grid
    ctx.fillStyle = colors.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = colors.grid; ctx.lineWidth = 1;
    for(let i=0; i<canvas.width; i+=grid) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
    
    // Draw Food (Apple)
    ctx.fillStyle = colors.apple; ctx.beginPath(); ctx.arc(food.x + grid/2, food.y + grid/2, grid/2 - 2, 0, Math.PI*2); ctx.fill();
    
    // Draw Snake
    snake.forEach((part, i) => {
      ctx.fillStyle = i === 0 ? colors.head : colors.body;
      ctx.fillRect(part.x + 1, part.y + 1, grid - 2, grid - 2);
    });
  }

  drawBase(); // Initial render
  function gameOver() { playSound('die'); isPlaying = false; clearInterval(loop); document.getElementById('start-btn').classList.remove('hidden'); document.getElementById('start-btn').innerText = "Game Over! Replay 🔄"; }
</script>
</body>
</html>
