<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepak | Cosmic Design Suite Pro</title>
    <style>
        :root {
            --bg-color: #f0f4f8; --text-color: #1e293b; --panel-bg: #ffffff;
            --border-color: #e2e8f0; --primary: #6366f1; --primary-hover: #4f46e5;
            --svg-bg: #e9ecef; --code-bg: #1e293b; --code-text: #a7f3d0;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a; --text-color: #f8fafc; --panel-bg: #1e293b;
            --border-color: #334155; --primary: #818cf8; --svg-bg: #0b1120;
            --code-bg: #000000; --code-text: #34d399;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--panel-bg); padding: 15px 40px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(45deg, var(--primary), #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { display: flex; flex-grow: 1; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .sidebar { width: 350px; display: flex; flex-direction: column; gap: 20px; }
        .tabs { display: flex; gap: 5px; background: var(--panel-bg); padding: 8px; border-radius: 12px; border: 1px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; background: #cbd5e1; font-size: 0.8rem; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .panel { background: var(--panel-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .control-section { display: none; }
        .control-section.active { display: block; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }
        .preview-box { width: 100%; height: 400px; background: var(--svg-bg); border-radius: 12px; position: relative; border: 2px dashed var(--border-color); overflow: hidden; cursor: crosshair; }
        #canvas-svg { width: 100%; height: 100%; }
        textarea { width: 100%; height: 120px; padding: 10px; border-radius: 8px; background: var(--code-bg); color: var(--code-text); font-family: monospace; resize: none; margin-top: 10px; }
        .info-panel { font-size: 0.85rem; line-height: 1.4; border-left: 4px solid var(--primary); padding-left: 10px; }
        .dim-label { position: absolute; background: var(--primary); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Deepak | Cosmic Design Suite</div>
        <button onclick="toggleTheme()" class="tab-btn" style="width:auto; padding: 5px 15px;">Theme Swap</button>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('waves')">Waves</button>
                <button class="tab-btn" onclick="switchTab('blobs')">Blobs</button>
                <button class="tab-btn" onclick="switchTab('draw')">Draw</button>
            </div>

            <div class="panel control-section active" id="waves-controls">
                <h3>Wave Settings</h3>
                <label>Complexity</label><input type="range" id="wCount" min="1" max="10" value="3">
                <label>Color</label><input type="color" id="wColor" value="#ec4899">
            </div>

            <div class="panel control-section" id="blobs-controls">
                <h3>Blob Settings</h3>
                <button class="tab-btn active" onclick="updateBlob()" style="width:100%; margin-bottom:10px;">🎲 Randomize</button>
                <label>Color</label><input type="color" id="bColor" value="#818cf8">
            </div>

            <div class="panel control-section" id="draw-controls">
                <h3>Custom Draw</h3>
                <p>Canvas par click karke drag karein rectangle banane ke liye.</p>
                <button class="tab-btn" onclick="clearDraw()" style="width:100%; margin-top:10px;">Clear All</button>
            </div>

            <div class="panel info-panel" id="info-text">
                <strong>Knowledge Hub:</strong><br>
                Select a tool to see how it works!
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h3 id="p-title">Live Preview</h3>
                <div class="preview-box" id="preview-area" onmousedown="startDraw(event)" onmousemove="doDraw(event)" onmouseup="endDraw()">
                    <svg id="canvas-svg" xmlns="http://www.w3.org/2000/svg"></svg>
                    <div id="dim-label" class="dim-label" style="display:none"></div>
                </div>
            </div>
            <div class="panel">
                <h3>Code Output</h3>
                <textarea id="code-output" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        let mode = 'waves';
        let drawing = false, startX, startY, currentRect;

        function toggleTheme() {
            document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function switchTab(t) {
            mode = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.control-section').forEach(s => s.classList.remove('active'));
            document.getElementById(t + '-controls').classList.add('active');
            
            const info = {
                waves: "<strong>Sine Waves:</strong> Ye smooth transitions ke liye use hoti hain. SVG me Path logic 'Q' (Quadratic) use karta hai.",
                blobs: "<strong>Organic Blobs:</strong> Ye soft shapes hote hain jo nature se inspire hain. Inme randomness key factor hai.",
                draw: "<strong>Custom SVG:</strong> Yahan aap coordinates calculate karke direct shapes draw kar rahe ho dimensions ke sath."
            };
            document.getElementById('info-text').innerHTML = info[t];
            clearDraw();
            if(t === 'waves') updateWave(); else if(t === 'blobs') updateBlob();
        }

        // --- DRAWING LOGIC ---
        function startDraw(e) {
            if(mode !== 'draw') return;
            drawing = true;
            const rect = document.getElementById('preview-area').getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            currentRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            currentRect.setAttribute("fill", "#6366f1");
            currentRect.setAttribute("fill-opacity", "0.5");
            document.getElementById('canvas-svg').appendChild(currentRect);
        }

        function doDraw(e) {
            if(!drawing || mode !== 'draw') return;
            const rect = document.getElementById('preview-area').getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;
            let w = Math.abs(x - startX);
            let h = Math.abs(y - startY);
            currentRect.setAttribute("x", Math.min(x, startX));
            currentRect.setAttribute("y", Math.min(y, startY));
            currentRect.setAttribute("width", w);
            currentRect.setAttribute("height", h);
            
            const label = document.getElementById('dim-label');
            label.style.display = 'block';
            label.style.left = x + 'px'; label.style.top = y + 'px';
            label.innerText = `W: ${Math.round(w)}px, H: ${Math.round(h)}px`;
            updateOutput();
        }

        function endDraw() { drawing = false; }
        function clearDraw() { 
            document.getElementById('canvas-svg').innerHTML = ''; 
            document.getElementById('dim-label').style.display = 'none';
            document.getElementById('code-output').value = '';
        }

        function updateOutput() {
            document.getElementById('code-output').value = document.getElementById('preview-area').innerHTML.split('<div')[0];
        }

        // (Previous Wave/Blob logic stays similar but simplified for integration)
        function updateWave() {
            if(mode !== 'waves') return;
            const c = document.getElementById('wCount').value, col = document.getElementById('wColor').value;
            let d = `M 0 200 Q 150 100 300 200 T 600 200 T 900 200 L 900 400 L 0 400 Z`;
            let svg = `<path fill="${col}" d="${d}" />`;
            document.getElementById('canvas-svg').innerHTML = svg;
            updateOutput();
        }

        function updateBlob() {
            if(mode !== 'blobs') return;
            let col = document.getElementById('bColor').value;
            let d = `M200,100 Q${100+Math.random()*200},${Math.random()*100} 300,200 T200,300 T100,200 Z`;
            document.getElementById('canvas-svg').innerHTML = `<path fill="${col}" d="${d}" />`;
            updateOutput();
        }

        document.getElementById('wCount').addEventListener('input', updateWave);
        document.getElementById('wColor').addEventListener('input', updateWave);
        document.getElementById('bColor').addEventListener('input', updateBlob);
        
        updateWave();
    </script>
</body>
</html>
