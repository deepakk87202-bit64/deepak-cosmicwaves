<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deepak Games | Pro Snake Xtreme</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  /* === THEMES & VARIABLES === */
  :root {
    --bg-grad: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
    --panel-bg: rgba(255, 255, 255, 0.6);
    --panel-border: rgba(255, 255, 255, 0.4);
    --text-main: #0f172a;
    --accent: #0284c7;
    --snake-head: #0369a1;
    --snake-body: #38bdf8;
    --apple-color: #ef4444;
    --grid-color: rgba(2, 132, 199, 0.1);
  }

  [data-theme="dark"] {
    --bg-grad: linear-gradient(135deg, #111827 0%, #1f2937 100%);
    --panel-bg: rgba(17, 24, 39, 0.8);
    --panel-border: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --accent: #9ca3af;
    --snake-head: #d1d5db;
    --snake-body: #6b7280;
    --apple-color: #ef4444;
    --grid-color: rgba(255, 255, 255, 0.05);
  }

  [data-theme="green"] {
    --bg-grad: linear-gradient(135deg, #dcfce7 0%, #86efac 100%);
    --accent: #16a34a; --snake-head: #14532d; --snake-body: #22c55e;
    --grid-color: rgba(22, 163, 74, 0.1);
  }

  [data-theme="pink"] {
    --bg-grad: linear-gradient(135deg, #fce7f3 0%, #f9a8d4 100%);
    --accent: #db2777; --snake-head: #831843; --snake-body: #ec4899;
    --grid-color: rgba(219, 39, 119, 0.1);
  }

  [data-theme="yellow"] {
    --bg-grad: linear-gradient(135deg, #fef9c3 0%, #fde047 100%);
    --text-main: #422006; --accent: #ca8a04; --snake-head: #713f12; --snake-body: #eab308;
    --grid-color: rgba(202, 138, 4, 0.1);
  }

  /* === GLOBAL STYLES === */
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  
  body {
    background: var(--bg-grad); color: var(--text-main);
    min-height: 100vh; display: flex; flex-direction: column;
    transition: background 0.5s ease, color 0.5s ease;
    overflow-x: hidden;
  }

  .glass {
    background: var(--panel-bg); backdrop-filter: blur(12px);
    border: 1px solid var(--panel-border); border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(0,0,0,0.15);
  }

  /* === TOP NAVBAR === */
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 5%; width: 100%; position: sticky; top: 0;
    z-index: 100; border-radius: 0 0 20px 20px; flex-wrap: wrap; gap: 10px;
  }

  .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

  .nav-btn {
    text-decoration: none; color: white; font-weight: bold;
    background: var(--apple-color); padding: 8px 15px; border-radius: 10px; transition: 0.3s;
    box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
  }
  .nav-btn:hover { transform: translateY(-2px); }

  /* Theme Selector */
  .theme-box { display: flex; gap: 10px; align-items: center; }
  .theme-dot {
    width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.2s;
  }
  .theme-dot:hover { transform: scale(1.2); }

  /* === MAIN CONTAINER === */
  .container {
    flex: 1; display: flex; justify-content: center; align-items: center;
    width: 100%; padding: 20px; position: relative;
  }

  .screen {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 90%; max-width: 400px; text-align: center; padding: 30px;
    opacity: 0; visibility: hidden; transition: all 0.4s ease; z-index: 10;
  }
  .screen.active { opacity: 1; visibility: visible; }

  h1 { font-size: 2.2rem; margin-bottom: 10px; color: var(--accent); }
  p { margin-bottom: 20px; }

  .btn {
    background: var(--accent); color: #fff; border: none; padding: 12px 30px;
    font-size: 1.2rem; font-weight: bold; border-radius: 25px; cursor: pointer;
    transition: transform 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .btn:hover { transform: translateY(-3px); }

  /* === GAME AREA === */
  #game-area { display: none; flex-direction: column; align-items: center; }
  #game-area.active { display: flex; }

  .hud {
    display: flex; justify-content: space-between; width: 100%; max-width: 400px;
    margin-bottom: 15px; padding: 10px 20px; font-weight: bold; font-size: 1.2rem;
  }

  canvas {
    background: var(--panel-bg); border: 2px solid var(--panel-border);
    border-radius: 15px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); width: 100%; max-width: 400px;
  }
</style>
</head>
<body>

<nav class="glass">
  <div class="logo"><i class="fa-solid fa-dragon"></i> Deepak Games</div>
  
  <a href="tictactoe.html" class="nav-btn"><i class="fa-solid fa-gamepad"></i> Play Tic-Tac-Toe</a>
  
  <div class="theme-box">
    <div class="theme-dot" style="background: #0284c7;" onclick="setTheme('')" title="Blue"></div>
    <div class="theme-dot" style="background: #111827;" onclick="setTheme('dark')" title="Black"></div>
    <div class="theme-dot" style="background: #16a34a;" onclick="setTheme('green')" title="Green"></div>
    <div class="theme-dot" style="background: #db2777;" onclick="setTheme('pink')" title="Pink"></div>
    <div class="theme-dot" style="background: #ca8a04;" onclick="setTheme('yellow')" title="Yellow"></div>
  </div>
</nav>

<div class="container">
  <div id="start-screen" class="screen glass active">
    <h1>Snake Xtreme 3D</h1>
    <p>Choose a theme above and start the adventure!</p>
    <button class="btn" onclick="startGame()"><i class="fa-solid fa-play"></i> Start Game</button>
  </div>

  <div id="game-over-screen" class="screen glass">
    <h1 style="color: var(--apple-color);">Game Over!</h1>
    <h2>Score: <span id="final-score">0</span></h2>
    <br>
    <button class="btn" onclick="startGame()"><i class="fa-solid fa-rotate-right"></i> Play Again</button>
  </div>

  <div id="game-area">
    <div class="hud glass">
      <div><i class="fa-solid fa-apple-whole" style="color:var(--apple-color)"></i> <span id="score">0</span></div>
      <div><i class="fa-solid fa-crown" style="color:var(--accent)"></i> <span id="high-score">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>
</div>

<script>
  // === THEME LOGIC ===
  function setTheme(themeName) {
    if(themeName === '') document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme', themeName);
  }

  // === AUDIO INTEGRATION ===
  const eatSound = new Audio('eat.mp3');
  const dieSound = new Audio('die.mp3');

  function playSound(type) {
    if (type === 'eat') {
      eatSound.currentTime = 0; 
      eatSound.play().catch(e => console.log("Audio not loaded"));
    } else if (type === 'die') {
      dieSound.currentTime = 0;
      dieSound.play().catch(e => console.log("Audio not loaded"));
    }
  }

  // === GAME ENGINE ===
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const gridSize = 20; const tileCount = canvas.width / gridSize;
  
  let snake = []; let dx = 0; let dy = 0; let nextDx = 0; let nextDy = 0;
  let foodX; let foodY; let score = 0;
  let highScore = localStorage.getItem('snakeHigh') || 0;
  let gameLoop; let gameSpeed = 120; let isPlaying = false;

  document.getElementById('high-score').innerText = highScore;

  // Controls
  document.addEventListener('keydown', changeDirection);

  // Swipe Controls for Mobile
  let touchX=0, touchY=0;
  canvas.addEventListener('touchstart', e => { touchX = e.touches[0].screenX; touchY = e.touches[0].screenY; }, {passive:true});
  canvas.addEventListener('touchend', e => {
    let dX = e.changedTouches[0].screenX - touchX;
    let dY = e.changedTouches[0].screenY - touchY;
    if(Math.abs(dX) > Math.abs(dY)) { if(dX>30) setDirection(1,0); else if(dX<-30) setDirection(-1,0); }
    else { if(dY>30) setDirection(0,1); else if(dY<-30) setDirection(0,-1); }
  }, {passive:true});

  function changeDirection(e) {
    const key = e.keyCode;
    if ((key === 37 || key === 65)) setDirection(-1, 0); // Left
    if ((key === 38 || key === 87)) setDirection(0, -1); // Up
    if ((key === 39 || key === 68)) setDirection(1, 0);  // Right
    if ((key === 40 || key === 83)) setDirection(0, 1);  // Down
  }

  function setDirection(nDx, nDy) {
    if (dx === 0 && dy === 0) { nextDx = nDx; nextDy = nDy; return; }
    if (nDx !== 0 && dx === -nDx) return;
    if (nDy !== 0 && dy === -nDy) return;
    nextDx = nDx; nextDy = nDy;
  }

  function startGame() {
    // Load audio on first click
    eatSound.load(); dieSound.load();

    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('game-over-screen').classList.remove('active');
    document.getElementById('game-area').classList.add('active');
    
    snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
    dx = 0; dy = -1; nextDx = 0; nextDy = -1;
    score = 0; document.getElementById('score').innerText = score;
    gameSpeed = 120; spawnFood(); isPlaying = true;
    clearTimeout(gameLoop); main();
  }

  function main() {
    if (!isPlaying) return;
    if (hasGameEnded()) { handleGameOver(); return; }
    dx = nextDx; dy = nextDy;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid(); drawFood(); advanceSnake(); drawSnake();
    gameLoop = setTimeout(main, gameSpeed);
  }

  function drawGrid() {
    ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--grid-color').trim();
    ctx.lineWidth = 1;
    for(let i=0; i<=canvas.width; i+=gridSize) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }
  }

  // === 3D SNAKE TEXTURE ===
  function drawSnake() {
    const rootStyles = getComputedStyle(document.body);
    const headColor = rootStyles.getPropertyValue('--snake-head').trim() || "#0369a1";
    const bodyColor = rootStyles.getPropertyValue('--snake-body').trim() || "#38bdf8";

    snake.forEach((part, index) => {
      let x = part.x * gridSize + gridSize/2;
      let y = part.y * gridSize + gridSize/2;
      
      // Radial Gradient for 3D scaly effect
      let gradient = ctx.createRadialGradient(x - 2, y - 2, 2, x, y, gridSize);
      gradient.addColorStop(0, index === 0 ? "#ffffff" : headColor); // Highlight
      gradient.addColorStop(0.5, index === 0 ? headColor : bodyColor); // Main color
      gradient.addColorStop(1, "rgba(0,0,0,0.6)"); // Shadow edges

      ctx.fillStyle = gradient;
      ctx.beginPath();
      // Drawing circles instead of boxes for 3D caterpillar look
      ctx.arc(x, y, gridSize/2 - 1, 0, 2*Math.PI);
      ctx.fill();
    });
  }

  function advanceSnake() {
    const head = {x: snake[0].x + dx, y: snake[0].y + dy};
    snake.unshift(head);
    
    // Eat Apple
    if (head.x === foodX && head.y === foodY) {
      score += 10; document.getElementById('score').innerText = score;
      playSound('eat'); // PLAY SOUND
      if (gameSpeed > 60) gameSpeed -= 2; 
      
      if (score > highScore) {
        highScore = score; document.getElementById('high-score').innerText = highScore;
        localStorage.setItem('snakeHigh', highScore);
      }
      spawnFood();
    } else { 
      snake.pop(); 
    }
  }

  function spawnFood() {
    foodX = Math.floor(Math.random() * tileCount); foodY = Math.floor(Math.random() * tileCount);
    snake.forEach(part => { if (part.x === foodX && part.y === foodY) spawnFood(); });
  }

  // === 3D APPLE TEXTURE ===
  function drawFood() {
    const rootStyles = getComputedStyle(document.body);
    const appleColor = rootStyles.getPropertyValue('--apple-color').trim() || "#ef4444";

    let x = foodX * gridSize + gridSize/2; let y = foodY * gridSize + gridSize/2;
    let grad = ctx.createRadialGradient(x-3, y-3, 1, x, y, gridSize/2);
    grad.addColorStop(0, "#ff9999"); 
    grad.addColorStop(0.6, appleColor); 
    grad.addColorStop(1, "#8b0000");
    
    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, gridSize/2 - 2, 0, 2*Math.PI); ctx.fill();
    // Apple leaf
    ctx.fillStyle = "#22c55e"; ctx.beginPath(); ctx.ellipse(x+3, y-7, 4, 2, Math.PI/4, 0, 2*Math.PI); ctx.fill();
  }

  function hasGameEnded() {
    if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) return true;
    for (let i = 4; i < snake.length; i++) { if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true; }
    return false;
  }

  function handleGameOver() {
    isPlaying = false; 
    playSound('die'); // PLAY SOUND
    document.getElementById('game-area').classList.remove('active');
    document.getElementById('game-over-screen').classList.add('active');
    document.getElementById('final-score').innerText = score;
  }
</script>
</body>
</html>
