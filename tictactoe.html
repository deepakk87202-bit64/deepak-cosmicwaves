<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Games | Tic-Tac-Toe</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg-grad: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
    --panel-bg: rgba(255, 255, 255, 0.6);
    --panel-border: rgba(255, 255, 255, 0.4);
    --text-main: #0f172a;
    --accent: #0284c7;
    --x-color: #ef4444; /* Red for X */
    --o-color: #3b82f6; /* Blue for O */
    --win-color: #16a34a; /* Green line for winning */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  
  body {
    background: var(--bg-grad); color: var(--text-main);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .glass {
    background: var(--panel-bg); backdrop-filter: blur(12px);
    border: 1px solid var(--panel-border); border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(0,0,0,0.15);
  }

  nav {
    position: absolute; top: 0; width: 100%; padding: 15px 5%;
    display: flex; justify-content: space-between; align-items: center;
    border-radius: 0 0 20px 20px;
  }

  .nav-btn {
    text-decoration: none; color: var(--text-main); font-weight: bold;
    background: rgba(255,255,255,0.5); padding: 8px 15px; border-radius: 10px; transition: 0.3s;
  }
  .nav-btn:hover { background: var(--accent); color: white; }

  .game-container {
    text-align: center; padding: 30px; width: 90%; max-width: 400px;
  }

  h1 { color: var(--accent); margin-bottom: 5px; font-size: 2.2rem; }
  .status { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; height: 35px; transition: transform 0.3s; }

  /* BOARD DESIGN */
  .board {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-bottom: 20px; position: relative; /* Line lagane ke liye zaroori hai */
  }

  .cell {
    width: 100%; aspect-ratio: 1; background: rgba(255,255,255,0.7);
    border: 2px solid var(--panel-border); border-radius: 15px;
    font-size: 4rem; font-weight: bold; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }
  
  .cell:hover { background: white; transform: scale(1.02); }
  .cell.X { color: var(--x-color); text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
  .cell.O { color: var(--o-color); text-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

  /* === WINNING STRIKE LINE === */
  .strike {
    position: absolute; background-color: var(--win-color); border-radius: 5px;
    z-index: 10; display: none; box-shadow: 0 0 15px var(--win-color);
  }

  /* Different positions for the strike line depending on win */
  .strike-row-1 { display: block; top: 15%; left: 2%; width: 96%; height: 6px; animation: drawWidth 0.5s ease-out forwards; }
  .strike-row-2 { display: block; top: 49%; left: 2%; width: 96%; height: 6px; animation: drawWidth 0.5s ease-out forwards; }
  .strike-row-3 { display: block; top: 83%; left: 2%; width: 96%; height: 6px; animation: drawWidth 0.5s ease-out forwards; }
  
  .strike-col-1 { display: block; left: 15%; top: 2%; height: 96%; width: 6px; animation: drawHeight 0.5s ease-out forwards; }
  .strike-col-2 { display: block; left: 49%; top: 2%; height: 96%; width: 6px; animation: drawHeight 0.5s ease-out forwards; }
  .strike-col-3 { display: block; left: 83%; top: 2%; height: 96%; width: 6px; animation: drawHeight 0.5s ease-out forwards; }
  
  .strike-diag-1 { display: block; top: 49%; left: -10%; width: 120%; height: 6px; transform: rotate(45deg); animation: drawWidth 0.5s ease-out forwards; }
  .strike-diag-2 { display: block; top: 49%; left: -10%; width: 120%; height: 6px; transform: rotate(-45deg); animation: drawWidth 0.5s ease-out forwards; }

  /* Animations for the strike line */
  @keyframes drawWidth { from { width: 0; } }
  @keyframes drawHeight { from { height: 0; } }

  .win-text-anim { animation: pop 0.5s ease infinite alternate; }
  @keyframes pop { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
  
  .btn-reset {
    background: var(--accent); color: #fff; border: none; padding: 12px 30px;
    font-size: 1.2rem; font-weight: bold; border-radius: 25px; cursor: pointer;
    transition: transform 0.3s ease; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
  }
  .btn-reset:hover { transform: translateY(-3px); }

</style>
</head>
<body>

<nav class="glass">
  <div style="font-size: 1.2rem; font-weight: bold; color: var(--accent);">
    <i class="fa-solid fa-gamepad"></i> Deepak Games
  </div>
  <a href="index.html" class="nav-btn"><i class="fa-solid fa-arrow-left"></i> Play Snake</a>
</nav>

<div class="game-container glass">
  <h1>Tic-Tac-Toe</h1>
  <div class="status" id="status">Player X's Turn</div>
  
  <div class="board" id="board">
    <div id="strike" class="strike"></div>

    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button class="btn-reset" onclick="resetGame()"><i class="fa-solid fa-rotate-right"></i> Restart Game</button>
</div>

<script>
  // === AUDIO SYSTEM ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
    
    if(type === 'tap') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'win') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }
  }

  // === GAME LOGIC ===
  const cells = document.querySelectorAll('.cell');
  const statusText = document.getElementById('status');
  const strikeLine = document.getElementById('strike');
  let board = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let isGameActive = true;

  // Har ek winning pattern ke aage maine line wali class laga di hai
  const winningConditions = [
    { combo: [0, 1, 2], strikeClass: "strike-row-1" },
    { combo: [3, 4, 5], strikeClass: "strike-row-2" },
    { combo: [6, 7, 8], strikeClass: "strike-row-3" },
    { combo: [0, 3, 6], strikeClass: "strike-col-1" },
    { combo: [1, 4, 7], strikeClass: "strike-col-2" },
    { combo: [2, 5, 8], strikeClass: "strike-col-3" },
    { combo: [0, 4, 8], strikeClass: "strike-diag-1" },
    { combo: [2, 4, 6], strikeClass: "strike-diag-2" }
  ];

  cells.forEach(cell => cell.addEventListener('click', handleCellClick));

  function handleCellClick(e) {
    const clickedCell = e.target;
    const cellIndex = clickedCell.getAttribute('data-index');

    if (board[cellIndex] !== "" || !isGameActive) return;

    playSound('tap');
    updateCell(clickedCell, cellIndex);
    checkWinner();
  }

  function updateCell(cell, index) {
    board[index] = currentPlayer;
    cell.innerText = currentPlayer;
    cell.classList.add(currentPlayer);
  }

  function checkWinner() {
    let roundWon = false;
    let winningClass = "";

    for (let i = 0; i < winningConditions.length; i++) {
      const { combo, strikeClass } = winningConditions[i];
      const [a, b, c] = combo;

      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        roundWon = true;
        winningClass = strikeClass;
        break;
      }
    }

    if (roundWon) {
      playSound('win');
      
      // 1. Strike line draw karo
      strikeLine.className = `strike ${winningClass}`;
      
      // 2. You Win likha aayega
      statusText.innerHTML = `<span style="color: var(--${currentPlayer.toLowerCase()}-color)">🏆 PLAYER ${currentPlayer} WINS! 🏆</span>`;
      statusText.classList.add('win-text-anim'); // text bada chota hoga (bounce)
      
      isGameActive = false;
      return;
    }

    if (!board.includes("")) {
      statusText.innerText = "It's a Draw! 🤝";
      isGameActive = false;
      return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    statusText.innerText = `Player ${currentPlayer}'s Turn`;
  }

  function resetGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    isGameActive = true;
    
    // Reset Sab Kuch
    statusText.innerText = `Player X's Turn`;
    statusText.classList.remove('win-text-anim');
    strikeLine.className = "strike"; // Line chupa do
    
    cells.forEach(cell => {
      cell.innerText = "";
      cell.classList.remove("X", "O");
    });
  }
</script>
</body>
</html>
