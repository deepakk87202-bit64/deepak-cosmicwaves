<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Games | Tic-Tac-Toe Pro</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  /* === THEMES === */
  :root {
    --bg-grad: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
    --panel-bg: rgba(255, 255, 255, 0.6);
    --panel-border: rgba(255, 255, 255, 0.4);
    --text-main: #0f172a;
    --accent: #0284c7;
    --x-color: #ef4444; 
    --o-color: #3b82f6; 
    --win-color: #16a34a; 
  }

  [data-theme="dark"] {
    --bg-grad: linear-gradient(135deg, #111827 0%, #1f2937 100%);
    --panel-bg: rgba(17, 24, 39, 0.8);
    --panel-border: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --accent: #9ca3af;
    --x-color: #f87171;
    --o-color: #60a5fa;
  }

  [data-theme="green"] {
    --bg-grad: linear-gradient(135deg, #dcfce7 0%, #86efac 100%);
    --accent: #16a34a; --text-main: #14532d;
  }

  [data-theme="pink"] {
    --bg-grad: linear-gradient(135deg, #fce7f3 0%, #f9a8d4 100%);
    --accent: #db2777; --text-main: #831843;
  }

  [data-theme="yellow"] {
    --bg-grad: linear-gradient(135deg, #fef9c3 0%, #fde047 100%);
    --text-main: #422006; --accent: #ca8a04;
  }

  /* === GLOBAL === */
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  
  body {
    background: var(--bg-grad); color: var(--text-main);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden; transition: background 0.5s ease, color 0.5s ease;
  }

  .glass {
    background: var(--panel-bg); backdrop-filter: blur(12px);
    border: 1px solid var(--panel-border); border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(0,0,0,0.15);
  }

  /* === NAVBAR === */
  nav {
    position: absolute; top: 0; width: 100%; padding: 15px 5%;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 100; flex-wrap: wrap; gap: 10px;
  }

  .nav-links { display: flex; gap: 15px; align-items: center; }
  .nav-link {
    text-decoration: none; color: var(--text-main); font-weight: bold; cursor: pointer;
    background: rgba(255,255,255,0.4); padding: 8px 12px; border-radius: 10px; transition: 0.3s;
  }
  .nav-link:hover { background: var(--accent); color: white; }

  /* Theme Dots */
  .theme-box { display: flex; gap: 8px; }
  .theme-dot {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.2s;
  }
  .theme-dot:hover { transform: scale(1.2); }

  /* === MODAL === */
  .modal {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 90%; max-width: 400px; padding: 30px; text-align: center;
    z-index: 200; display: none;
  }
  .modal.active { display: block; animation: fadeIn 0.3s ease; }
  .close-btn { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; color: var(--accent); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* === GAME CONTAINER === */
  .game-container { text-align: center; padding: 30px; width: 90%; max-width: 400px; margin-top: 50px; }
  h1 { color: var(--accent); margin-bottom: 5px; }
  .status { font-size: 1.4rem; font-weight: bold; margin-bottom: 20px; height: 35px; }

  /* === BOARD & STRIKE LINE === */
  .board {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-bottom: 20px; position: relative;
  }

  .cell {
    width: 100%; aspect-ratio: 1; background: rgba(255,255,255,0.7);
    border: 2px solid var(--panel-border); border-radius: 15px;
    font-size: 3.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.2s;
  }
  .cell:hover { background: white; transform: scale(1.02); }
  .cell.X { color: var(--x-color); }
  .cell.O { color: var(--o-color); }

  .strike {
    position: absolute; background-color: var(--win-color); border-radius: 10px;
    z-index: 10; display: none; box-shadow: 0 0 10px var(--win-color);
  }

  /* Row Lines */
  .strike-row-1 { display: block; top: 15%; left: 5%; width: 90%; height: 6px; transform-origin: left; animation: growX 0.4s ease-out; }
  .strike-row-2 { display: block; top: 49%; left: 5%; width: 90%; height: 6px; transform-origin: left; animation: growX 0.4s ease-out; }
  .strike-row-3 { display: block; top: 83%; left: 5%; width: 90%; height: 6px; transform-origin: left; animation: growX 0.4s ease-out; }
  
  /* Column Lines */
  .strike-col-1 { display: block; left: 15%; top: 5%; height: 90%; width: 6px; transform-origin: top; animation: growY 0.4s ease-out; }
  .strike-col-2 { display: block; left: 49%; top: 5%; height: 90%; width: 6px; transform-origin: top; animation: growY 0.4s ease-out; }
  .strike-col-3 { display: block; left: 83%; top: 5%; height: 90%; width: 6px; transform-origin: top; animation: growY 0.4s ease-out; }
  
  /* Diagonal Lines */
  .strike-diag-1 { display: block; top: 0%; left: 0%; width: 140%; height: 6px; transform: rotate(45deg); transform-origin: 0% 0%; animation: growX 0.4s ease-out; }
  .strike-diag-2 { display: block; top: 0%; right: 0%; width: 140%; height: 6px; transform: rotate(-45deg); transform-origin: 100% 0%; animation: growX 0.4s ease-out; }

  @keyframes growX { from { transform: scaleX(0); } }
  @keyframes growY { from { transform: scaleY(0); } }

  .btn-reset {
    background: var(--accent); color: #fff; border: none; padding: 12px 30px;
    font-size: 1.1rem; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.3s;
  }
  .btn-reset:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(2, 132, 199, 0.4); }
</style>
</head>
<body>

<nav class="glass">
  <div style="font-weight: bold; color: var(--accent);"><i class="fa-solid fa-gamepad"></i> Deepak Games</div>
  
  <div class="nav-links">
    <div class="theme-box">
      <div class="theme-dot" style="background: #0284c7;" onclick="setTheme('')" title="Blue"></div>
      <div class="theme-dot" style="background: #111827;" onclick="setTheme('dark')" title="Black"></div>
      <div class="theme-dot" style="background: #16a34a;" onclick="setTheme('green')" title="Green"></div>
      <div class="theme-dot" style="background: #db2777;" onclick="setTheme('pink')" title="Pink"></div>
      <div class="theme-dot" style="background: #ca8a04;" onclick="setTheme('yellow')" title="Yellow"></div>
    </div>
    
    <span class="nav-link" onclick="toggleModal('rules-modal')"><i class="fa-solid fa-scroll"></i> Rules</span>
    <a href="index.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Snake</a>
  </div>
</nav>

<div id="rules-modal" class="modal glass">
  <span class="close-btn" onclick="toggleModal('rules-modal')">&times;</span>
  <h2><i class="fa-solid fa-scroll"></i> Game Rules</h2>
  <div style="text-align: left; margin-top: 15px;">
    <p>1. Game 2 players ke beech hota hai (X aur O).</p>
    <p>2. Grid mein 3 symbols ek sath (Row, Column, ya Diagonal) lane wala player jeet jata hai.</p>
    <p>3. Agar grid full ho jaye aur koi na jeete, toh Match Draw ho jata hai.</p>
  </div>
  <button class="btn-reset" style="margin-top: 15px;" onclick="toggleModal('rules-modal')">Got it!</button>
</div>

<div class="game-container glass">
  <h1>Tic-Tac-Toe</h1>
  <div class="status" id="status">Player X's Turn</div>
  
  <div class="board" id="board">
    <div id="strike" class="strike"></div>
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button class="btn-reset" onclick="resetGame()"><i class="fa-solid fa-rotate-right"></i> Restart</button>
</div>

<script>
  // === THEME LOGIC ===
  function setTheme(themeName) {
    if(themeName === '') document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme', themeName);
  }

  // AUDIO
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type==='tap'){ osc.frequency.setValueAtTime(800, 0); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); osc.start(); osc.stop(audioCtx.currentTime+0.1); }
    else { osc.frequency.setValueAtTime(500, 0); osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime+0.2); osc.start(); osc.stop(audioCtx.currentTime+0.3); }
  }

  // MODAL LOGIC
  function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }

  // GAME LOGIC
  const cells = document.querySelectorAll('.cell');
  const statusText = document.getElementById('status');
  const strikeLine = document.getElementById('strike');
  let board = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let isGameActive = true;

  const winConditions = [
    { combo: [0, 1, 2], sClass: "strike-row-1" },
    { combo: [3, 4, 5], sClass: "strike-row-2" },
    { combo: [6, 7, 8], sClass: "strike-row-3" },
    { combo: [0, 3, 6], sClass: "strike-col-1" },
    { combo: [1, 4, 7], sClass: "strike-col-2" },
    { combo: [2, 5, 8], sClass: "strike-col-3" },
    { combo: [0, 4, 8], sClass: "strike-diag-1" },
    { combo: [2, 4, 6], sClass: "strike-diag-2" }
  ];

  cells.forEach(cell => cell.addEventListener('click', () => {
    const idx = cell.dataset.index;
    if (board[idx] !== "" || !isGameActive) return;
    playSound('tap');
    board[idx] = currentPlayer;
    cell.innerText = currentPlayer;
    cell.classList.add(currentPlayer);
    checkWinner();
  }));

  function checkWinner() {
    let won = false;
    for (let condition of winConditions) {
      const [a, b, c] = condition.combo;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        won = true;
        strikeLine.className = `strike ${condition.sClass}`;
        break;
      }
    }

    if (won) {
      playSound('win');
      statusText.innerHTML = `<span style="color:var(--win-color)">🏆 PLAYER ${currentPlayer} WINS! 🏆</span>`;
      isGameActive = false;
    } else if (!board.includes("")) {
      statusText.innerText = "Match Draw! 🤝";
      isGameActive = false;
    } else {
      currentPlayer = currentPlayer === "X" ? "O" : "X";
      statusText.innerText = `Player ${currentPlayer}'s Turn`;
    }
  }

  function resetGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    isGameActive = true;
    statusText.innerText = `Player X's Turn`;
    strikeLine.className = "strike";
    cells.forEach(c => { c.innerText = ""; c.classList.remove("X", "O"); });
  }
</script>
</body>
</html>
