<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Games | Auto Ludo</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  :root { --bg-grad: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); --panel-bg: rgba(255, 255, 255, 0.8); --accent: #0284c7; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body { background: var(--bg-grad); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 80px; overflow-x: hidden; }

  nav { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100; }
  .nav-btn { text-decoration: none; color: white; background: var(--accent); padding: 8px 15px; border-radius: 10px; font-weight: bold; }
  
  .status-box { font-size: 1.5rem; font-weight: bold; padding: 10px 20px; border-radius: 15px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; transition: 0.3s; }
  
  /* Dice */
  .dice { width: 80px; height: 80px; background: white; border-radius: 15px; border: 3px solid #333; display: flex; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.2); transition: 0.2s; margin-bottom: 30px; }
  .dice:active { transform: scale(0.9); }
  .rolling { animation: roll 0.4s linear infinite; }
  @keyframes roll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* Circular Board for Auto-Movement */
  .track { position: relative; width: 320px; height: 320px; border-radius: 50%; border: 10px dashed #ccc; display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.4); }
  .track::after { content: 'LUDO RACE'; font-weight: bold; font-size: 1.5rem; color: #999; }
  
  /* Tokens */
  .token { position: absolute; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 5px 10px rgba(0,0,0,0.5); transition: all 0.5s ease-in-out; z-index: 10; }
  #tok-0 { background: #ef4444; } /* Red */
  #tok-1 { background: #22c55e; } /* Green */
  #tok-2 { background: #eab308; } /* Yellow */
  #tok-3 { background: #3b82f6; } /* Blue */

</style>
</head>
<body>

<nav>
  <h2 style="color:var(--accent)"><i class="fa-solid fa-gamepad"></i> Deepak Games</h2>
  <div style="display: flex; gap: 10px;">
    <a href="index.html" class="nav-btn">Snake</a>
    <a href="tictactoe.html" class="nav-btn">Tic-Tac-Toe</a>
  </div>
</nav>

<div id="turn-indicator" class="status-box" style="color: #ef4444;">Player Red's Turn</div>

<div id="dice" class="dice" onclick="rollDice()">⚀</div>

<div class="track">
  <div id="tok-0" class="token"></div>
  <div id="tok-1" class="token"></div>
  <div id="tok-2" class="token"></div>
  <div id="tok-3" class="token"></div>
</div>

<script>
  // Web Audio for Dice and Move
  const actx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    if(actx.state === 'suspended') actx.resume();
    let osc = actx.createOscillator(); let gain = actx.createGain();
    osc.connect(gain); gain.connect(actx.destination);
    if(type === 'roll') { osc.type = 'square'; osc.frequency.setValueAtTime(300, actx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, actx.currentTime + 0.2); gain.gain.setValueAtTime(0.1, actx.currentTime); gain.gain.linearRampToValueAtTime(0.01, actx.currentTime + 0.2); osc.start(); osc.stop(actx.currentTime + 0.2); }
    if(type === 'move') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, actx.currentTime); gain.gain.setValueAtTime(0.2, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.1); osc.start(); osc.stop(actx.currentTime + 0.1); }
  }

  const players = [
    { name: 'Red', color: '#ef4444', pos: 0 },
    { name: 'Green', color: '#22c55e', pos: 0 },
    { name: 'Yellow', color: '#eab308', pos: 0 },
    { name: 'Blue', color: '#3b82f6', pos: 0 }
  ];
  let turn = 0; let isRolling = false;
  const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
  const totalSteps = 40; // Track length

  // Circular positioning math
  function updateTokenPositions() {
    const radius = 160; const center = 160;
    players.forEach((p, i) => {
      let angle = (p.pos / totalSteps) * (2 * Math.PI) - (Math.PI / 2); // Start at top
      let x = center + radius * Math.cos(angle) - 15; // 15 is half token width
      let y = center + radius * Math.sin(angle) - 15;
      
      // Offset slightly so tokens don't overlap exactly
      x += (i * 8) - 12;
      y += (i * 8) - 12;

      let tok = document.getElementById(`tok-${i}`);
      tok.style.transform = `translate(${x}px, ${y}px)`;
    });
  }

  updateTokenPositions(); // Set initial positions

  function rollDice() {
    if(isRolling) return;
    isRolling = true; playSound('roll');
    const dice = document.getElementById('dice');
    dice.classList.add('rolling');

    let rollInterval = setInterval(() => { dice.innerText = diceFaces[Math.floor(Math.random() * 6)]; }, 50);

    setTimeout(() => {
      clearInterval(rollInterval); dice.classList.remove('rolling');
      let result = Math.floor(Math.random() * 6) + 1;
      dice.innerText = diceFaces[result - 1];

      // Auto Move Logic
      moveToken(turn, result);
    }, 400);
  }

  function moveToken(playerIdx, steps) {
    let currentStep = 0;
    let moveInterval = setInterval(() => {
      if(currentStep < steps) {
        players[playerIdx].pos = (players[playerIdx].pos + 1) % totalSteps;
        playSound('move');
        updateTokenPositions();
        currentStep++;
      } else {
        clearInterval(moveInterval);
        // Switch turn if not 6
        if(steps !== 6) {
          turn = (turn + 1) % 4;
          let ind = document.getElementById('turn-indicator');
          ind.innerText = `Player ${players[turn].name}'s Turn`;
          ind.style.color = players[turn].color;
        }
        isRolling = false;
      }
    }, 300); // 300ms per step animation
  }
</script>
</body>
</html>
